<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Android</title>
</head>
<body style="background:black; color:white; font-family:Arial;">
    <h1>Test Cámara Android</h1>
    <button onclick="start()" style="font-size:20px; padding:20px;">INICIAR</button>
    <video id="v" autoplay playsInline style="width:100%; height:300px; background:#333;"></video>
    <div id="log" style="color:red; margin-top:20px;"></div>

    <script>
        async function start() {
            try {
                document.getElementById('log').innerText = 'Pidiendo cámara...';
                const s = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
                document.getElementById('v').srcObject = s;
                document.getElementById('log').innerText = '¡Funciona! Ahora probá el código completo.';
            } catch(e) {
                document.getElementById('log').innerText = 'Error: ' + e.message;
            }
        }
    </script>
</body>
</html>
